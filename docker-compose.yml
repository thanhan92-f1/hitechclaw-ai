services:
  hitechclaw-ai:
    build: .
    container_name: hitechclaw-ai
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hitechclaw-ai}:${POSTGRES_PASSWORD:-hitechclaw-ai}@db:5432/${POSTGRES_DB:-hitechclaw-ai}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/setup/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: hitechclaw-ai-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hitechclaw-ai}
      POSTGRES_USER: ${POSTGRES_USER:-hitechclaw-ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hitechclaw-ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hitechclaw-ai} -d ${POSTGRES_DB:-hitechclaw-ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
