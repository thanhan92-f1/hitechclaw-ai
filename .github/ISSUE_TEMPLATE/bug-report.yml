name: Bug report
description: Something isn't working as expected
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. The more detail you provide, the faster we can reproduce, triage, and fix the problem.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and did not find a duplicate report.
          required: true
        - label: I can reproduce this on the latest main branch, latest container image, or latest deployed build available to me.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
      placeholder: "When I click the kill switch on an active agent, nothing happens and the agent keeps running."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      placeholder: "The agent should have stopped immediately and the banner should update to show it was killed."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start an agent session
        2. Navigate to the dashboard
        3. Click the kill button on the active run banner
        4. Observe that the agent continues running
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical - production outage, data loss, or major security risk
        - High - major feature broken or high operational impact
        - Medium - important issue with a workaround
        - Low - minor issue or cosmetic defect
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Dashboard / Overview
        - Agent Management
        - ThreatGuard / Security
        - Cost Tracking
        - Workflow Builder
        - Infrastructure Monitoring
        - MCP Gateway
        - Authentication / RBAC
        - API / SDK
        - Installation / Deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HiTechClaw Ai version
      placeholder: "v0.1.0 or commit hash"
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Manual (npm run dev)
        - HiTechClaw Ai Cloud
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Include OS, browser, runtime version, container version, and any relevant infrastructure details.
      placeholder: |
        - OS: Ubuntu 24.04
        - Browser: Chrome 135
        - Node.js: 22.x
        - Deployment: Docker Compose on a single VM
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste error messages, console output, or attach screenshots.
  - type: textarea
    id: impact
    attributes:
      label: Business or operational impact
      description: Explain how this affects users, agents, automation, or operations.
      placeholder: "This blocks setup for new tenants because the wizard cannot complete step 2."
