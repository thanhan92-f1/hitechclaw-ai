name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["feature-request", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're solving, not just the feature you want. Context helps us build the right thing.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues, discussions, and roadmap items before opening this request.
          required: true
        - label: This request is aligned with the repository's self-hosted AI governance scope.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "I'm running 5 agents across 3 servers and I can't tell at a glance which agents are healthy and which need attention."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would the ideal solution look like?
      placeholder: "A health score per agent on the agent list page, color-coded green/amber/red based on error rate, threat count, and last-active time."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      placeholder: "I've been checking each agent individually and cross-referencing with ThreatGuard, but it takes too long."
  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Dashboard / Overview
        - Agent Management
        - ThreatGuard / Security
        - Cost Tracking
        - Workflow Builder
        - Infrastructure Monitoring
        - MCP Gateway
        - Notifications / Alerts
        - API / SDK
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: sdk-release-context
    attributes:
      label: SDK context (for API / SDK requests)
      description: Fill this in when the request touches `@hitechclaw-ai/sdk` or future client packages.
      placeholder: |
        Package: @hitechclaw-ai/sdk
        Current version: 0.1.0
        Expected install or publish flow impact:
        - consumer install
        - package API surface
        - npm publish automation
        - release/tagging policy
  - type: dropdown
    id: priority
    attributes:
      label: Priority from your perspective
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Who benefits from this?
      placeholder: "Operators managing multiple tenants and security teams reviewing threat incidents."
  - type: textarea
    id: acceptance
    attributes:
      label: What would success look like?
      description: Define concrete outcomes or acceptance criteria.
      placeholder: |
        - Health status is visible on the agent list page
        - Operators can filter by unhealthy agents
        - Data is available via API for automation
  - type: textarea
    id: risks
    attributes:
      label: Risks, trade-offs, or implementation notes
      placeholder: "This may increase dashboard query cost, so caching or pre-aggregation may be needed."
