documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "INSTALL.md"
          - "API.md"
          - "FEATURES.md"
          - "QUICKSTART.md"
          - "CHANGELOG.md"
          - "docs/**"

