name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      force-full-regression:
        description: Force the categorized regression matrix even when path filters would skip it.
        required: false
        default: false
        type: boolean
      force-cross-browser:
        description: Force the UI cross-browser matrix on manual runs.
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Classify change scope
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      automation: ${{ steps.filter.outputs.automation }}
      runtime: ${{ steps.filter.outputs.runtime }}
      docs_only: ${{ steps.flags.outputs.docs_only }}
      automation_only: ${{ steps.flags.outputs.automation_only }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'README.md'
              - 'INSTALL.md'
              - 'QUICKSTART.md'
              - 'API.md'
              - 'FEATURES.md'
              - 'CHANGELOG.md'
              - 'SECURITY.md'
              - 'SUPPORT.md'
              - 'docs/**'
            automation:
              - '.github/**'
              - '.githooks/**'
              - 'scripts/**'
            runtime:
              - 'src/**'
              - 'tests/**'
              - 'public/**'
              - 'migrations/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.ts'
              - 'playwright.config.ts'
              - 'tsconfig.json'
              - 'eslint.config.mjs'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'docker-compose.test.yml'

      - name: Derive workflow flags
        id: flags
        shell: pwsh
        run: |
          $docs = '${{ steps.filter.outputs.docs }}'
          $automation = '${{ steps.filter.outputs.automation }}'
          $runtime = '${{ steps.filter.outputs.runtime }}'

          $docsOnly = 'false'
          $automationOnly = 'false'

          if ($docs -eq 'true' -and $automation -ne 'true' -and $runtime -ne 'true') {
            $docsOnly = 'true'
          }

          if ($automation -eq 'true' -and $runtime -ne 'true' -and $docs -ne 'true') {
            $automationOnly = 'true'
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "docs_only=$docsOnly"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "automation_only=$automationOnly"

  docs-governance:
    name: Docs and governance baseline
    needs: changes
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify core guidance files exist
        shell: pwsh
        run: |
          $required = @('README.md', 'INSTALL.md', 'SECURITY.md', 'SUPPORT.md', 'docs/github-governance.md', 'docs/development.md')
          foreach ($file in $required) {
            if (-not (Test-Path $file)) {
              throw "Missing required guidance file: $file"
            }
          }

      - name: Write CI scope summary
        shell: pwsh
        run: |
          @(
            '## CI Scope',
            '- docs changed: **${{ needs.changes.outputs.docs }}**',
            '- automation changed: **${{ needs.changes.outputs.automation }}**',
            '- runtime changed: **${{ needs.changes.outputs.runtime }}**',
            '- docs only: **${{ needs.changes.outputs.docs_only }}**',
            '- automation only: **${{ needs.changes.outputs.automation_only }}**',
            '',
            '## Runner model',
            '- All CI jobs run on the repository self-hosted Windows runner.',
            '- This avoids GitHub-hosted Actions minutes for both runtime and governance automation.'
          ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY

  lint-build:
    name: Lint and build application
    needs: changes
    if: ${{ needs.changes.outputs.runtime == 'true' || needs.changes.outputs.automation == 'true' }}
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Prepare local environment files
        shell: pwsh
        run: |
          Copy-Item .env.development.example .env.local -Force
          Copy-Item .env.test.example .env.test.local -Force

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Run lint
        shell: pwsh
        run: npm run lint

      - name: Run production build
        shell: pwsh
        run: npm run build

  smoke:
    name: Smoke test critical APIs and UI flows
    needs:
      - changes
      - lint-build
    if: ${{ needs.changes.outputs.runtime == 'true' || needs.changes.outputs.automation == 'true' }}
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Prepare local environment files
        shell: pwsh
        run: |
          Copy-Item .env.development.example .env.local -Force
          Copy-Item .env.test.example .env.test.local -Force
          if (Test-Path playwright-report) { Remove-Item playwright-report -Recurse -Force }
          if (Test-Path test-results) { Remove-Item test-results -Recurse -Force }

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Install Playwright browsers
        shell: pwsh
        run: npx playwright install chromium firefox webkit

      - name: Prepare test database
        shell: pwsh
        run: npm run test:setup

      - name: Run smoke coverage
        shell: pwsh
        run: npm run test:smoke:managed

      - name: Clean test database
        if: always()
        shell: pwsh
        run: npm run test:clean

  regression:
    name: Full Playwright regression suite
    needs:
      - changes
      - smoke
    if: ${{ needs.changes.outputs.runtime == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force-full-regression) }}
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    timeout-minutes: 75
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - suite: api
            command: npm run test:e2e:api
          - suite: ui
            command: npm run test:e2e:ui
          - suite: mobile
            command: npm run test:e2e:mobile
          - suite: edge
            command: npm run test:e2e:edge
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Prepare local environment files
        shell: pwsh
        run: |
          Copy-Item .env.development.example .env.local -Force
          Copy-Item .env.test.example .env.test.local -Force
          if (Test-Path playwright-report) { Remove-Item playwright-report -Recurse -Force }
          if (Test-Path test-results) { Remove-Item test-results -Recurse -Force }

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Install Playwright browsers
        shell: pwsh
        run: npx playwright install chromium firefox webkit

      - name: Prepare test database
        shell: pwsh
        run: npm run test:setup

      - name: Run ${{ matrix.suite }} regression slice
        shell: pwsh
        run: ${{ matrix.command }}

      - name: Clean test database
        if: always()
        shell: pwsh
        run: npm run test:clean

  cross-browser:
    name: Cross-browser UI regression
    needs:
      - changes
      - smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.force-cross-browser }}
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        project:
          - chromium-desktop
          - firefox-desktop
          - webkit-desktop
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Prepare local environment files
        shell: pwsh
        run: |
          Copy-Item .env.development.example .env.local -Force
          Copy-Item .env.test.example .env.test.local -Force
          if (Test-Path playwright-report) { Remove-Item playwright-report -Recurse -Force }
          if (Test-Path test-results) { Remove-Item test-results -Recurse -Force }

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Install Playwright browsers
        shell: pwsh
        run: npx playwright install chromium firefox webkit

      - name: Prepare test database
        shell: pwsh
        run: npm run test:setup

      - name: Run UI tests on ${{ matrix.project }}
        shell: pwsh
        run: node --env-file=.env.test.local ./node_modules/@playwright/test/cli.js test tests/ui --project=${{ matrix.project }}

      - name: Clean test database
        if: always()
        shell: pwsh
        run: npm run test:clean
