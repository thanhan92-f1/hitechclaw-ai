name: Continuous Integration

"on":
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/screenshots/**"
      - "docs/assets/**"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/screenshots/**"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      run_full_regression:
        description: "Run the cross-browser Playwright regression suite in addition to categorized slice jobs"
        required: false
        default: true
        type: boolean
      build_docker_image:
        description: "Validate the production Docker image during manual runs"
        required: false
        default: true
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  PORT: 3000
  NODE_ENV: test
  POSTGRES_USER: hitechclaw-ai
  POSTGRES_PASSWORD: hitechclaw-ai
  POSTGRES_DB: hitechclaw-ai
  DATABASE_URL: postgresql://hitechclaw-ai:hitechclaw-ai@127.0.0.1:5432/hitechclaw-ai
  HITECHCLAW_AI_BASE_URL: http://127.0.0.1:3000
  NEXTAUTH_URL: http://127.0.0.1:3000
  NEXTAUTH_SECRET: ci-nextauth-secret-for-github-actions-only
  MC_ADMIN_TOKEN: test-admin-token
  MC_AGENT_TOKENS: default:test-agent-token
  MC_AGENT_TOKEN: default:test-agent-token

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect runtime-impacting changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_build: ${{ steps.resolve.outputs.run_build }}
      run_smoke: ${{ steps.resolve.outputs.run_smoke }}
      run_full_regression: ${{ steps.resolve.outputs.run_full_regression }}
      run_cross_browser: ${{ steps.resolve.outputs.run_cross_browser }}
      run_docker: ${{ steps.resolve.outputs.run_docker }}
      automation_only: ${{ steps.resolve.outputs.automation_only }}
      docs_only: ${{ steps.resolve.outputs.docs_only }}
    steps:
      - name: Check out repository for diff calculation
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect runtime-impacting path changes
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app_runtime:
              - 'src/**'
              - 'packages/sdk/**'
              - 'tests/**'
              - 'migrations/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'next.config.ts'
              - 'playwright.config.ts'
              - 'eslint.config.mjs'
              - 'postcss.config.mjs'
              - 'next-env.d.ts'
              - 'Dockerfile'
              - 'docker-entrypoint.sh'
              - 'docker-compose.yml'
              - 'docker-compose.dev.yml'
              - 'docker-compose.test.yml'
              - 'ecosystem.config.js'
            automation:
              - '.github/workflows/ci.yml'
              - '.github/actions/**'
              - '.githooks/**'
              - 'scripts/**'
            docs_governance:
              - 'README.md'
              - 'API.md'
              - 'CHANGELOG.md'
              - 'COMMERCIAL-LICENSE.md'
              - 'CONTRIBUTING.md'
              - 'FEATURES.md'
              - 'INSTALL.md'
              - 'LICENSE'
              - 'NOTICE'
              - 'OPERATION-EXTINGUISHER-KILL-SWITCH-REBUILD.md'
              - 'QUICKSTART.md'
              - 'SECURITY.md'
              - 'SUPPORT.md'
              - 'SCREENSHOTS-NEEDED.md'
              - 'docs/**'

      - name: Resolve CI execution decision
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
            echo "run_smoke=true" >> "$GITHUB_OUTPUT"
            echo "run_full_regression=${{ github.event_name == 'schedule' || inputs.run_full_regression }}" >> "$GITHUB_OUTPUT"
            echo "run_cross_browser=${{ github.event_name == 'schedule' || inputs.run_full_regression }}" >> "$GITHUB_OUTPUT"
            echo "run_docker=${{ github.event_name == 'workflow_dispatch' && inputs.build_docker_image }}" >> "$GITHUB_OUTPUT"
            echo "automation_only=false" >> "$GITHUB_OUTPUT"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          else
            if [[ "${{ steps.filter.outputs.app_runtime }}" == "true" ]]; then
              echo "run_build=true" >> "$GITHUB_OUTPUT"
              echo "run_smoke=true" >> "$GITHUB_OUTPUT"
              if [[ "${{ github.event_name }}" == "push" ]]; then
                echo "run_full_regression=true" >> "$GITHUB_OUTPUT"
              else
                echo "run_full_regression=false" >> "$GITHUB_OUTPUT"
              fi
              echo "run_cross_browser=false" >> "$GITHUB_OUTPUT"
              echo "run_docker=true" >> "$GITHUB_OUTPUT"
              echo "automation_only=false" >> "$GITHUB_OUTPUT"
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
            elif [[ "${{ steps.filter.outputs.automation }}" == "true" ]]; then
              echo "run_build=true" >> "$GITHUB_OUTPUT"
              echo "run_smoke=true" >> "$GITHUB_OUTPUT"
              echo "run_full_regression=false" >> "$GITHUB_OUTPUT"
              echo "run_cross_browser=false" >> "$GITHUB_OUTPUT"
              echo "run_docker=false" >> "$GITHUB_OUTPUT"
              echo "automation_only=true" >> "$GITHUB_OUTPUT"
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
            else
              echo "run_build=false" >> "$GITHUB_OUTPUT"
              echo "run_smoke=false" >> "$GITHUB_OUTPUT"
              echo "run_full_regression=false" >> "$GITHUB_OUTPUT"
              echo "run_cross_browser=false" >> "$GITHUB_OUTPUT"
              echo "run_docker=false" >> "$GITHUB_OUTPUT"
              echo "automation_only=false" >> "$GITHUB_OUTPUT"
              echo "docs_only=${{ steps.filter.outputs.docs_governance }}" >> "$GITHUB_OUTPUT"
            fi
          fi

  lightweight_governance:
    name: Lightweight docs and governance signal
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify core governance files exist
        run: |
          required_files=(
            README.md
            CONTRIBUTING.md
            SECURITY.md
            SUPPORT.md
            LICENSE
            docs/development.md
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required governance file: $file" >&2
              exit 1
            fi
          done

      - name: Publish CI scope summary
        run: |
          echo "# CI scope summary" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ needs.changes.outputs.run_full_regression }}" == "true" ]]; then
            echo "- App/runtime changes detected: smoke, categorized regression, and Docker validation will run for the applicable event." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.changes.outputs.run_smoke }}" == "true" && "${{ needs.changes.outputs.automation_only }}" == "true" ]]; then
            echo "- Automation-only changes detected: lint/build and smoke coverage will run, while broader categorized regression is skipped intentionally." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.changes.outputs.run_smoke }}" == "true" ]]; then
            echo "- Runtime-impacting changes detected: smoke coverage will run." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.changes.outputs.docs_only }}" == "true" ]]; then
            echo "- Docs/governance-only changes detected: lightweight checks passed and heavy CI jobs were skipped intentionally." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No runtime-impacting changes detected: lightweight checks passed and heavy CI jobs were skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

  lint_and_build:
    name: Lint and build application
    if: needs.changes.outputs.run_build == 'true'
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22 and restore npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies from package-lock.json
        run: npm ci

      - name: Run ESLint across the Next.js workspace
        run: npm run lint

      - name: Build publishable packages
        run: npm run build:packages

      - name: Validate SDK package tests
        run: npm run test:sdk

      - name: Produce a standalone production build
        run: npm run build

  smoke_tests:
    name: Smoke test critical APIs and UI flows
    needs:
      - changes
      - lint_and_build
    if: needs.changes.outputs.run_smoke == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: hitechclaw-ai
          POSTGRES_PASSWORD: hitechclaw-ai
          POSTGRES_DB: hitechclaw-ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hitechclaw-ai -d hitechclaw-ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22 and restore npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies from package-lock.json
        run: npm ci

      - name: Install Playwright Chromium runtime for smoke coverage
        run: npx playwright install --with-deps chromium

      - name: Wait for PostgreSQL service to become reachable
        run: npx wait-on tcp:127.0.0.1:5432

      - name: Apply SQL and TypeScript migrations
        run: npm run db:migrate

      - name: Build the application before serving it to Playwright
        run: npm run build

      - name: Start the Next.js production server in the background
        run: |
          npm run start > hitechclaw-server.log 2>&1 &
          echo $! > hitechclaw-server.pid

      - name: Wait for application health endpoint
        run: npx wait-on http://127.0.0.1:3000/api/health

      - name: Execute the smoke-tagged Playwright suite on chromium-desktop
        run: npm run test:smoke -- --project=chromium-desktop

      - name: Upload Playwright HTML report when smoke tests fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-chromium-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload server log when smoke tests fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-server-log
          path: hitechclaw-server.log
          retention-days: 5
          if-no-files-found: ignore

      - name: Stop background server cleanly
        if: always()
        run: |
          if [[ -f hitechclaw-server.pid ]]; then
            kill "$(cat hitechclaw-server.pid)" || true
          fi

  categorized_regression:
    name: Categorized Playwright regression (${{ matrix.slice.name }})
    if: needs.changes.outputs.run_full_regression == 'true'
    needs:
      - changes
      - lint_and_build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        slice:
          - name: api
            command: npm run test:e2e:api -- --project=chromium-desktop
            browsers: chromium
            artifact_suffix: api
          - name: ui
            command: npm run test:e2e:ui -- --project=chromium-desktop
            browsers: chromium
            artifact_suffix: ui
          - name: mobile
            command: npm run test:e2e:mobile
            browsers: chromium
            artifact_suffix: mobile
          - name: edge
            command: npm run test:e2e:edge -- --project=chromium-desktop
            browsers: chromium
            artifact_suffix: edge
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: hitechclaw-ai
          POSTGRES_PASSWORD: hitechclaw-ai
          POSTGRES_DB: hitechclaw-ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hitechclaw-ai -d hitechclaw-ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22 and restore npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies from package-lock.json
        run: npm ci

      - name: Install Playwright runtime for categorized regression slice
        run: npx playwright install --with-deps ${{ matrix.slice.browsers }}

      - name: Wait for PostgreSQL service to become reachable
        run: npx wait-on tcp:127.0.0.1:5432

      - name: Apply SQL and TypeScript migrations
        run: npm run db:migrate

      - name: Build the application before serving it to Playwright
        run: npm run build

      - name: Start the Next.js production server in the background
        run: |
          npm run start > hitechclaw-server.log 2>&1 &
          echo $! > hitechclaw-server.pid

      - name: Wait for application health endpoint
        run: npx wait-on http://127.0.0.1:3000/api/health

      - name: Execute categorized Playwright regression slice
        run: ${{ matrix.slice.command }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-categorized-${{ matrix.slice.artifact_suffix }}-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload server log on regression failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ matrix.slice.artifact_suffix }}-server-log
          path: hitechclaw-server.log
          retention-days: 5
          if-no-files-found: ignore

      - name: Stop background server cleanly
        if: always()
        run: |
          if [[ -f hitechclaw-server.pid ]]; then
            kill "$(cat hitechclaw-server.pid)" || true
          fi

  cross_browser_regression:
    name: Cross-browser Playwright UI regression
    if: needs.changes.outputs.run_cross_browser == 'true'
    needs:
      - changes
      - lint_and_build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: chromium-desktop
            browsers: chromium
          - name: firefox-desktop
            browsers: firefox
          - name: webkit-desktop
            browsers: webkit
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: hitechclaw-ai
          POSTGRES_PASSWORD: hitechclaw-ai
          POSTGRES_DB: hitechclaw-ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hitechclaw-ai -d hitechclaw-ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22 and restore npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies from package-lock.json
        run: npm ci

      - name: Install Playwright browser runtime for matrix project
        run: npx playwright install --with-deps ${{ matrix.project.browsers }}

      - name: Wait for PostgreSQL service to become reachable
        run: npx wait-on tcp:127.0.0.1:5432

      - name: Apply SQL and TypeScript migrations
        run: npm run db:migrate

      - name: Build the application before serving it to Playwright
        run: npm run build

      - name: Start the Next.js production server in the background
        run: |
          npm run start > hitechclaw-server.log 2>&1 &
          echo $! > hitechclaw-server.pid

      - name: Wait for application health endpoint
        run: npx wait-on http://127.0.0.1:3000/api/health

      - name: Execute cross-browser desktop UI regression
        run: npm run test:e2e:ui -- --project=${{ matrix.project.name }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-cross-browser-${{ matrix.project.name }}-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload server log on regression failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-${{ matrix.project.name }}-server-log
          path: hitechclaw-server.log
          retention-days: 5
          if-no-files-found: ignore

      - name: Stop background server cleanly
        if: always()
        run: |
          if [[ -f hitechclaw-server.pid ]]; then
            kill "$(cat hitechclaw-server.pid)" || true
          fi

  docker_image_validation:
    name: Validate Docker production image
    if: needs.changes.outputs.run_docker == 'true'
    needs:
      - changes
      - lint_and_build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the Docker image without pushing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: hitechclaw-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max