name: Repository Label Synchronization

"on":
  push:
    branches:
      - main
    paths:
      - ".github/labels.yml"
      - ".github/workflows/labels.yml"
  schedule:
    - cron: "10 2 * * 1"
  workflow_dispatch:

concurrency:
  group: labels-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync_labels:
    name: Sync repository labels from source control
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Synchronize labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
          dry-run: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}