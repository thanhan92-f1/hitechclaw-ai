name: Repository Label Synchronization

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.yml
      - .github/workflows/labels.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync-labels:
    name: Synchronize repository labels
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync labels from source control
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
          dry-run: false

      - name: Write synchronization summary
        shell: pwsh
        run: |
          @(
            '## Label synchronization',
            '- Source: .github/labels.yml',
            '- Mode: apply missing and updated labels',
            '- Destructive deletes: disabled'
          ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY
