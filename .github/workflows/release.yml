name: Release and Delivery

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_version:
        description: Release tag to publish, for example v0.1.0.
        required: true
        type: string
      publish_container:
        description: Publish the GHCR container image.
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  prepare:
    name: Verify release candidate
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_version: ${{ steps.version.outputs.image_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.release_version }}'
          } else {
            $version = $env:GITHUB_REF_NAME
          }

          if ($version -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$') {
            throw "Release version must match v<semver>. Got: $version"
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value ("image_version=" + ($version -replace '^v', ''))

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Prepare local environment files
        shell: pwsh
        run: |
          Copy-Item .env.development.example .env.local -Force
          Copy-Item .env.test.example .env.test.local -Force

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run production build
        run: npm run build

      - name: Build release manifest
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-bundle -Force | Out-Null
          $manifest = [ordered]@{
            version = '${{ steps.version.outputs.version }}'
            commit = $env:GITHUB_SHA
            repository = $env:GITHUB_REPOSITORY
            generatedAt = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            artifacts = [ordered]@{
              container = 'ghcr.io/thanhan92-f1/hitechclaw-ai:${{ steps.version.outputs.version }}'
            }
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path release-bundle/release-manifest.json

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ steps.version.outputs.version }}
          path: release-bundle/release-manifest.json
          retention-days: 1

  publish-container:
    name: Publish release container
    needs: prepare
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_container }}
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    timeout-minutes: 90
    env:
      IMAGE_NAME: ghcr.io/thanhan92-f1/hitechclaw-ai
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=HiTechClaw AI
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.vendor=Pho Tue SoftWare Solutions JSC

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release image digest
        shell: pwsh
        run: |
          cosign sign --yes "${IMAGE_NAME}@${{ steps.build.outputs.digest }}"

  github-release:
    name: Create GitHub release
    needs:
      - prepare
      - publish-container
    if: ${{ always() && needs.prepare.result == 'success' && (needs.publish-container.result == 'success' || needs.publish-container.result == 'skipped') }}
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release-bundle

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-bundle/release-manifest.json
          body: |
            Release automation completed for `${{ needs.prepare.outputs.version }}`.

            - Container image: `ghcr.io/thanhan92-f1/hitechclaw-ai:${{ needs.prepare.outputs.version }}`
            - Multi-arch platforms: `linux/amd64`, `linux/arm64`
            - OCI provenance: enabled
            - SPDX SBOM: enabled
            - Sigstore/Cosign keyless signature: enabled

      - name: Write release summary
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Release summary'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Version: \`${{ needs.prepare.outputs.version }}\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Release manifest attached to GitHub Release'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Container published: **${{ needs.publish-container.result != ''skipped'' }}**'
          if ('${{ needs.publish-container.result }}' -eq 'success') {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Digest: \`${{ needs.publish-container.outputs.digest }}\`"
          }
