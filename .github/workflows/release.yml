name: Release and Delivery

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_version:
        description: Release tag to publish, for example v0.1.0.
        required: true
        type: string
      publish_container:
        description: Publish the GHCR container image.
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  prepare:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_version: ${{ steps.version.outputs.image_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version='${{ inputs.release_version }}'
          else
            version='${GITHUB_REF_NAME}'
          fi

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must match v<semver>. Got: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image_version=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Prepare local environment files
        shell: bash
        run: |
          cp .env.development.example .env.local
          cp .env.test.example .env.test.local

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run production build
        run: npm run build

      - name: Build release manifest
        shell: bash
        run: |
          mkdir -p release-bundle
          cat > release-bundle/release-manifest.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "commit": "${GITHUB_SHA}",
            "repository": "${GITHUB_REPOSITORY}",
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "artifacts": {
              "container": "ghcr.io/thanhan92-f1/hitechclaw-ai:${{ steps.version.outputs.version }}"
            }
          }
          EOF

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ steps.version.outputs.version }}
          path: release-bundle/release-manifest.json

  publish-container:
    name: Publish release container
    needs: prepare
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_container }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      IMAGE_NAME: ghcr.io/thanhan92-f1/hitechclaw-ai
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=HiTechClaw AI
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.vendor=Pho Tue SoftWare Solutions JSC

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release image digest
        shell: bash
        run: |
          cosign sign --yes "${IMAGE_NAME}@${{ steps.build.outputs.digest }}"

  github-release:
    name: Create GitHub release
    needs:
      - prepare
      - publish-container
    if: ${{ always() && needs.prepare.result == 'success' && (needs.publish-container.result == 'success' || needs.publish-container.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release-bundle

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-bundle/release-manifest.json
          body: |
            Release automation completed for `${{ needs.prepare.outputs.version }}`.

            - Container image: `ghcr.io/thanhan92-f1/hitechclaw-ai:${{ needs.prepare.outputs.version }}`
            - Multi-arch platforms: `linux/amd64`, `linux/arm64`
            - OCI provenance: enabled
            - SPDX SBOM: enabled
            - Sigstore/Cosign keyless signature: enabled

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## Release summary"
            echo "- Version: \\`${{ needs.prepare.outputs.version }}\\`"
            echo "- Release manifest attached to GitHub Release"
            echo "- Container published: **${{ needs.publish-container.result != 'skipped' }}**"
            if [[ "${{ needs.publish-container.result }}" == "success" ]]; then
              echo "- Digest: \\`${{ needs.publish-container.outputs.digest }}\\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
