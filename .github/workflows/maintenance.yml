name: Dependency and Repository Maintenance

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  dependabot-triage:
    name: Triage Dependabot pull requests
    if: ${{ github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]' }}
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply dependency labels and approvals
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = new Set((pr.labels || []).map((label) => label.name));
            const dependencyNames = String('${{ steps.metadata.outputs.dependency-names }}');
            const ecosystem = String('${{ steps.metadata.outputs.package-ecosystem }}');
            const updateType = String('${{ steps.metadata.outputs.update-type }}');
            const labelsToAdd = ['dependencies'];

            if (ecosystem === 'npm') {
              labelsToAdd.push('deps:npm');
            } else if (ecosystem === 'github_actions') {
              labelsToAdd.push('deps:github-actions');
            } else if (ecosystem === 'docker') {
              labelsToAdd.push('deps:docker');
            }

            if (updateType.includes('version-update:semver-patch')) {
              labelsToAdd.push('patch', 'automerge-candidate');
            } else if (updateType.includes('version-update:semver-minor')) {
              labelsToAdd.push('minor', 'automerge-candidate');
            } else if (updateType.includes('version-update:semver-major')) {
              labelsToAdd.push('major-update');
            }

            const missing = labelsToAdd.filter((label) => !labels.has(label));
            if (missing.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: missing,
              });
            }

            if (updateType.includes('semver-patch') || updateType.includes('semver-minor')) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                event: 'APPROVE',
                body: `Low-risk Dependabot update approved automatically.\n\n- Ecosystem: ${ecosystem}\n- Dependencies: ${dependencyNames || 'n/a'}\n- Update type: ${updateType}`,
              });
            }

  dependency-report:
    name: Produce dependency health report
    if: ${{ github.event_name != 'pull_request_target' }}
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install dependencies
        run: npm ci

      - name: Build dependency status summary
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Dependency health report'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### npm outdated'

          & npm outdated --long
          $status = $LASTEXITCODE

          if ($status -eq 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'No outdated npm dependencies were reported.'
          } elseif ($status -eq 1) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'Outdated packages are listed above.'
          } else {
            throw "npm outdated failed with exit code $status"
          }
