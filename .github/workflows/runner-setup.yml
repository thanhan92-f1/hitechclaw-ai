name: Self-Hosted Runner Setup Guide

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Primary custom label expected on the runner.
        required: false
        default: hitechclaw
        type: string
            runs-on:
              - self-hosted
              - windows
              - x64
              - hitechclaw
permissions:
  contents: read
                shell: pwsh
jobs:
                  @(
                    '# Self-hosted runner setup',
                    '',
                    'Expected labels for repository workflows: **self-hosted**, **windows**, **x64**, **${{ inputs.runner_label }}**',
                    '',
                    '## Recommended runner host baseline',
                    '- Windows Server 2022 or Windows 11',
                    '- Node.js 25.x',
                    '- npm 10+',
                    '- Docker Desktop or Docker Engine with Compose v2',
                    '- Docker configured for Linux container builds with Buildx support',
                    '- PowerShell 7+ available as `pwsh`',
                    '- Playwright browser dependencies installed for Chromium, Firefox, and WebKit',
                    '',
                    '## Suggested bootstrap sequence',
                    '1. Create a dedicated service account for GitHub Actions runs.',
                    '2. Install the GitHub self-hosted runner from the repository or organization settings.',
                    '3. Register labels: `self-hosted`, `windows`, `x64`, and `${{ inputs.runner_label }}`.',
                    '4. Install Node.js 25 and confirm `node -v` and `npm -v`.',
                    '5. Install Docker and verify `docker version`, `docker compose version`, and `docker buildx version`.',
                    '6. Pre-install Playwright browsers with `npx playwright install chromium firefox webkit`.',
                    '7. Grant the runner account access to Docker and the workspace directory.',
                    '8. Keep the runner persistent as a Windows service, not an interactive shell.',
                    '',
                    '## Repository expectations',
                    '- CI creates `.env.local` from `.env.development.example`.',
                    '- CI creates `.env.test.local` from `.env.test.example`.',
                    '- Governance, publishing, and runtime jobs all execute on the self-hosted runner.',
                    '- Docker publish and release flows require Linux container mode plus Buildx/Cosign support on the host.',
                    '',
                    '## Validation checklist',
                    '- The runner appears online in GitHub settings.',
                    '- Labels exactly match the workflow configuration.',
                    '- `npm ci`, `npm run build`, and `npm run test:smoke:managed` succeed on the host.',
                    '- `docker buildx build` and `cosign version` succeed on the host.',
                    '- Docker-based dev/test database scripts run without elevation prompts.'
                  ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY
            echo ""
            echo "## Validation checklist"
            echo "- The runner appears online in GitHub settings."
            echo "- Labels exactly match the CI workflow."
            echo "- \\`npm ci\\`, \\`npm run build\\`, and \\`npm run test:smoke:managed\\` succeed on the host."
            echo "- Docker-based dev/test database scripts run without elevation prompts."
          } >> "$GITHUB_STEP_SUMMARY"
