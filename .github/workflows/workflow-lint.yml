name: Workflow Lint

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/labeler.yml'
      - '.github/labels.yml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/labeler.yml'
      - '.github/labels.yml'
  workflow_dispatch:

concurrency:
  group: workflow-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: Validate GitHub workflow definitions
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install actionlint
        shell: pwsh
        run: |
          $headers = @{ 'User-Agent' = 'GitHub-Actions-Workflow-Lint' }
          $release = Invoke-RestMethod -Headers $headers -Uri 'https://api.github.com/repos/rhysd/actionlint/releases/latest'
          $asset = $release.assets | Where-Object { $_.name -match 'windows_amd64\.zip$' } | Select-Object -First 1

          if (-not $asset) {
            throw 'Unable to locate a Windows amd64 actionlint release asset.'
          }

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile actionlint.zip
          Expand-Archive -Path actionlint.zip -DestinationPath actionlint-bin -Force
          (Resolve-Path actionlint-bin).Path | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run actionlint
        shell: pwsh
        run: actionlint.exe -color

      - name: Write validation summary
        if: always()
        shell: pwsh
        run: |
          @(
            '## Workflow lint summary',
            '- Validator: actionlint',
            '- Scope: .github/workflows plus label metadata files',
            '- Result: completed in the current job log'
          ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY