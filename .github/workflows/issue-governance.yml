name: Issue Governance and Intake Quality

"on":
  issues:
    types:
      - opened
      - edited
      - reopened
  workflow_dispatch:

concurrency:
  group: issue-governance-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  guide_issue_authors:
    name: Guide issue authors toward actionable reports
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Analyze issue body quality and respond with guidance
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const title = (issue.title || '').toLowerCase();
            const body = issue.body || '';
            const lower = body.toLowerCase();
            const labels = (issue.labels || []).map((label) => typeof label === 'string' ? label : label.name);

            const isBug = labels.includes('bug') || title.startsWith('[bug]');
            const isFeature = labels.includes('feature-request') || title.startsWith('[feature]');
            const missing = [];

            if (isBug) {
              if (!lower.includes('what happened')) missing.push('clear bug description');
              if (!lower.includes('steps to reproduce')) missing.push('reproduction steps');
              if (!lower.includes('severity')) missing.push('severity');
              if (!lower.includes('deployment method')) missing.push('deployment method');
              if (!lower.includes('environment details')) missing.push('environment details');
            }

            if (isFeature) {
              if (!lower.includes('what problem does this solve')) missing.push('problem statement');
              if (!lower.includes('what would the ideal solution look like')) missing.push('proposed solution');
              if (!lower.includes('feature area')) missing.push('feature area');
              if (!lower.includes('priority from your perspective')) missing.push('priority');
              if (!lower.includes('what would success look like')) missing.push('acceptance criteria');
            }

            const welcome = [
              'Thanks for opening this issue.',
              '',
              'A maintainer or automation flow will triage it shortly. In the meantime, logs, screenshots, exact reproduction steps, and deployment details always help.',
            ];

            let guidance = '';
            if (missing.length) {
              guidance = [
                'This issue still needs a bit more detail before it is fully actionable:',
                '',
                ...missing.map((item) => `- ${item}`),
                '',
                'Please update the issue form so maintainers can reproduce or scope the request quickly.',
              ].join('\n');
            }

            const message = [...welcome, guidance].filter(Boolean).join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });

            const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes('Thanks for opening this issue.'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: message,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: message,
              });
            }

      - name: Add summary for maintainers
        run: |
          {
            echo "# Issue governance review"
            echo ""
            echo "Issue #${{ github.event.issue.number }} received an automated intake quality review."
          } >> "$GITHUB_STEP_SUMMARY"