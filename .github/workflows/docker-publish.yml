name: Docker Package Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Build and publish GHCR image
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    timeout-minutes: 60
    env:
      IMAGE_NAME: ghcr.io/thanhan92-f1/hitechclaw-ai
    steps:
      - name: Enforce main branch for manual runs
        if: ${{ github.ref_name != 'main' }}
        shell: pwsh
        run: |
          throw 'Docker publish is only supported from the main branch.'

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=HiTechClaw AI
            org.opencontainers.image.description=AI governance platform container image
            org.opencontainers.image.vendor=Pho Tue SoftWare Solutions JSC

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published image digest
        shell: pwsh
        run: |
          cosign sign --yes "${IMAGE_NAME}@${{ steps.build.outputs.digest }}"

      - name: Write publish summary
        shell: pwsh
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Docker publish summary'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Image: \`${env:IMAGE_NAME}\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Digest: \`${{ steps.build.outputs.digest }}\`"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Tags:'
          $tags = ($env:IMAGE_TAGS -split "`r?`n") | Where-Object { $_ }
          foreach ($tag in $tags) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- \`$tag\`"
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Platforms: `linux/amd64`, `linux/arm64`'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Provenance: enabled'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- SBOM: enabled'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Signature: keyless Cosign via GitHub OIDC'
