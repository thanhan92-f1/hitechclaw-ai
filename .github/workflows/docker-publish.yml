name: Docker Package Publish

"on":
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_latest:
        description: "Also publish the latest tag during manual runs"
        required: false
        default: true
        type: boolean

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  detect_publish_changes:
    name: Detect container-impacting changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      publish_image: ${{ steps.resolve.outputs.publish_image }}
    steps:
      - name: Check out repository for diff calculation
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Docker package publishing changes
        if: github.event_name == 'push'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            image_inputs:
              - 'Dockerfile'
              - 'docker-entrypoint.sh'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.ts'
              - 'tsconfig.json'
              - 'postcss.config.mjs'
              - 'eslint.config.mjs'
              - 'next-env.d.ts'
              - 'ecosystem.config.js'
              - 'src/**'
              - 'public/**'
              - 'migrations/**'
              - 'scripts/**'

      - name: Resolve publish decision
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "publish_image=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_image=${{ steps.filter.outputs.image_inputs }}" >> "$GITHUB_OUTPUT"
          fi

  publish_ghcr_image:
    name: Publish Docker image to GHCR
    needs: detect_publish_changes
    if: needs.detect_publish_changes.outputs.publish_image == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign for keyless signing
        uses: sigstore/cosign-installer@v3

      - name: Generate Docker image metadata and tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && inputs.publish_latest }}
          labels: |
            org.opencontainers.image.title=HiTechClaw AI
            org.opencontainers.image.description=Self-hosted AI governance platform image
            org.opencontainers.image.vendor=Pho Tue SoftWare Solutions JSC
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image package
        id: build_and_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign published Docker image with Sigstore
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign ghcr.io/${{ github.repository }}@${{ steps.build_and_push.outputs.digest }}

      - name: Publish package summary
        run: |
          echo "# Docker package publish" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "Published image tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "Published platforms: linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
          echo "Supply-chain metadata: provenance + SBOM attestations enabled" >> "$GITHUB_STEP_SUMMARY"
          echo "Signing: keyless Sigstore/Cosign signature published for image digest" >> "$GITHUB_STEP_SUMMARY"

  publish_skipped_summary:
    name: Docker publish skip summary
    needs: detect_publish_changes
    if: needs.detect_publish_changes.outputs.publish_image != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish skip summary
        run: |
          echo "# Docker package publish" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "No container-impacting changes detected on this push, so GHCR publishing was skipped." >> "$GITHUB_STEP_SUMMARY"