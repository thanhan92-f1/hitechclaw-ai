name: HiTechClaw Ai E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: hitechclaw-ai
          POSTGRES_PASSWORD: hitechclaw-ai
          POSTGRES_DB: hitechclaw-ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hitechclaw-ai:hitechclaw-ai@localhost:5432/hitechclaw-ai
      MC_ADMIN_TOKEN: test-admin-token-ci
      MC_AGENT_TOKENS: default:test-agent-token
      HITECHCLAW_AI_BASE_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret-32chars-minimum
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx tsx scripts/migrate.ts

      - name: Build HiTechClaw Ai
        run: npm run build

      - name: Start HiTechClaw Ai server
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000/api/health --timeout 30000

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test --project=chromium-desktop
        env:
          MC_ADMIN_TOKEN: test-admin-token-ci
          MC_AGENT_TOKENS: default:test-agent-token
          HITECHCLAW_AI_BASE_URL: http://localhost:3000

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
