name: Community Health and First Interaction

"on":
  issues:
    types:
      - opened
  pull_request_target:
    types:
      - opened
  discussion:
    types:
      - created
  workflow_dispatch:

concurrency:
  group: community-health-${{ github.event.issue.number || github.event.pull_request.number || github.event.discussion.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  welcome_issue_author:
    name: Welcome first-time issue authors
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Add a friendly maintainer-style welcome comment
        uses: actions/first-interaction@v3
        with:
          issue_message: |
            Thanks for opening your first issue in HiTechClaw AI.

            A maintainer and the repository automation will review it shortly. The fastest way to get traction is to include reproducible steps, deployment details, logs, screenshots, and the exact feature area involved.

            If your issue is actually a usage question, consider moving the conversation to GitHub Discussions so the issue tracker stays focused on actionable engineering work.

  welcome_pull_request_author:
    name: Welcome first-time pull request authors
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      - name: Add a welcome comment for first-time contributors
        uses: actions/first-interaction@v3
        with:
          pr_message: |
            Thanks for contributing your first pull request to HiTechClaw AI.

            Please make sure the PR description stays aligned with the governance template, including validation notes, risk assessment, and rollback information when relevant.

            A maintainer will review the change after the automated checks complete.

  acknowledge_discussion:
    name: Acknowledge new Discussions
    if: github.event_name == 'discussion'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      discussions: write
    steps:
      - name: Post a welcome reply in new Discussions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const discussion = context.payload.discussion;
            const body = [
              'Thanks for starting a discussion in HiTechClaw AI.',
              '',
              'This space is the best place for support questions, implementation guidance, roadmap conversation, and general operator feedback.',
              '',
              'If the conversation reveals a confirmed defect or a well-scoped enhancement request, feel free to convert it into an issue with the relevant template and supporting detail.',
            ].join('\n');

            await github.graphql(
              `mutation($discussionId: ID!, $body: String!) {
                addDiscussionComment(input: {discussionId: $discussionId, body: $body}) {
                  comment {
                    id
                  }
                }
              }`,
              {
                discussionId: discussion.node_id,
                body,
              }
            );