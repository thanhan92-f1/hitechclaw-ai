name: Publish npm SDK

on:
  push:
    tags:
      - "sdk-v*.*.*"
  workflow_dispatch:
    inputs:
      sdk_version:
        description: SDK version to publish, for example 0.1.0.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish @hitechclaw-ai/sdk
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve SDK version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.sdk_version }}" ]]; then
            version='${{ inputs.sdk_version }}'
          else
            version='${GITHUB_REF_NAME#sdk-v}'
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "SDK version must match semver. Got: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate SDK version
        run: npm run check:sdk-version -- ${{ steps.version.outputs.version }}

      - name: Build SDK
        run: npm run build:sdk

      - name: Pack SDK artifact
        run: npm pack ./packages/sdk

      - name: Upload packed SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-package-${{ steps.version.outputs.version }}
          path: hitechclaw-ai-sdk-*.tgz
          if-no-files-found: error

      - name: Publish SDK to npm
        working-directory: ./packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Write npm publish summary
        shell: bash
        run: |
          {
            echo "## npm publish summary"
            echo "- Package: \\`@hitechclaw-ai/sdk\\`"
            echo "- Version: \\`${{ steps.version.outputs.version }}\\`"
            echo "- Provenance: enabled"
            echo "- Trigger: \\`${{ github.event_name }}\\`"
          } >> "$GITHUB_STEP_SUMMARY"
