name: Publish npm SDK

on:
  push:
    tags:
      - "sdk-v*.*.*"
  workflow_dispatch:
    inputs:
      sdk_version:
        description: SDK version to publish, for example 0.1.0.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish @hitechclaw-ai/sdk
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve SDK version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ inputs.sdk_version }}') {
            $version = '${{ inputs.sdk_version }}'
          } else {
            $version = $env:GITHUB_REF_NAME -replace '^sdk-v', ''
          }

          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$') {
            throw "SDK version must match semver. Got: $version"
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate SDK version
        run: npm run check:sdk-version -- ${{ steps.version.outputs.version }}

      - name: Build SDK
        run: npm run build:sdk

      - name: Pack SDK artifact
        run: npm pack ./packages/sdk

      - name: Publish SDK to npm
        working-directory: ./packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Write npm publish summary
        shell: pwsh
        run: |
          @(
            '## npm publish summary',
            '- Package: `@hitechclaw-ai/sdk`',
            '- Version: `${{ steps.version.outputs.version }}`',
            '- Provenance: enabled',
            '- Trigger: `${{ github.event_name }}`'
          ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY
