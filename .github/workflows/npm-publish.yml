name: Publish npm SDK

"on":
  push:
    tags:
      - "sdk-v*.*.*"
  workflow_dispatch:
    inputs:
      package_version:
        description: "Optional SDK version override for manual publishes, for example 0.1.0"
        required: false
        type: string
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish_sdk:
    name: Build and publish @hitechclaw-ai/sdk
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SDK_PACKAGE_NAME: '@hitechclaw-ai/sdk'
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js 22 and npm registry
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies from package-lock.json
        run: npm ci

      - name: Determine SDK version
        run: |
          CURRENT_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "sdk_package=${SDK_PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sdk_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/sdk-v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/sdk-v}"
            node ./scripts/check-sdk-version.mjs "$TAG_VERSION"
            echo "sdk_target=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.package_version }}" && "${{ inputs.package_version }}" != "$CURRENT_VERSION" ]]; then
            node ./scripts/check-sdk-version.mjs "${{ inputs.package_version }}"
            echo "sdk_target=${{ inputs.package_version }}" >> "$GITHUB_OUTPUT"
          else
            node ./scripts/check-sdk-version.mjs
            echo "sdk_target=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          fi
        id: sdk_meta

      - name: Build SDK package
        run: npm run build:sdk

      - name: Run SDK smoke validation
        run: npm run smoke:sdk

      - name: Publish SDK to npmjs
        run: npm publish ./packages/sdk --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish workflow summary
        if: always()
        run: |
          echo "# npm SDK publish" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: ${{ steps.sdk_meta.outputs.sdk_package }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- package.json version: ${{ steps.sdk_meta.outputs.sdk_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target version: ${{ steps.sdk_meta.outputs.sdk_target }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ref: $GITHUB_REF" >> "$GITHUB_STEP_SUMMARY"