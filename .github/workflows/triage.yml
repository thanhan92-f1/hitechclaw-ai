name: Issue and Pull Request Triage

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  issue-triage:
    name: Apply issue triage labels
    if: ${{ github.event_name == 'issues' }}
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    steps:
      - name: Ensure needs-triage label exists
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const current = new Set((issue.labels || []).map((label) => label.name));
            const labelsToAdd = [];

            if (!current.has('needs-triage')) {
              labelsToAdd.push('needs-triage');
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd,
              });
            }

  pull-request-triage:
    name: Apply pull request labels
    if: ${{ github.event_name == 'pull_request_target' }}
    runs-on:
      - self-hosted
      - windows
      - x64
      - hitechclaw
    steps:
      - name: Check out repository metadata
        uses: actions/checkout@v4

      - name: Apply path-based labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

      - name: Apply semantic labels from PR body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || '').toLowerCase();
            const current = new Set((pr.labels || []).map((label) => label.name));
            const labelsToAdd = [];

            const mappings = [
              { test: /security/i, label: 'security' },
              { test: /ci \/ github automation|workflow/i, label: 'ci' },
              { test: /documentation|docs?/i, label: 'documentation' },
              { test: /installation guidance|deployment/i, label: 'installation' },
              { test: /workflow builder|operations \/ runbook/i, label: 'workflows' },
            ];

            for (const mapping of mappings) {
              if (mapping.test.test(pr.body || '') && !current.has(mapping.label)) {
                labelsToAdd.push(mapping.label);
              }
            }

            if (!current.has('needs-triage')) {
              labelsToAdd.push('needs-triage');
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [...new Set(labelsToAdd)],
              });
            }
