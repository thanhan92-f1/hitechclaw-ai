name: Issue and Pull Request Triage

"on":
  issues:
    types:
      - opened
      - edited
      - reopened
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: triage-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  issue_triage:
    name: Triage newly opened or edited issues
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Add baseline triage labels using issue content
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const haystack = `${issue.title}\n${issue.body || ''}`.toLowerCase();
            const labels = new Set(['needs-triage']);

            const rules = [
              { label: 'documentation', patterns: ['readme', 'docs', 'documentation', 'guide', 'install.md', 'api.md'] },
              { label: 'ci', patterns: ['github actions', 'workflow', 'pipeline', 'ci/cd', 'dependabot', '.github'] },
              { label: 'security', patterns: ['security', 'auth', 'csrf', 'token', 'credential', 'rbac', 'vulnerability'] },
              { label: 'installation', patterns: ['install', 'setup', 'docker compose', 'dockerfile', 'deploy', 'deployment'] },
              { label: 'workflows', patterns: ['workflow builder', 'cron', 'scheduler', 'trigger node', 'automation node'] },
              { label: 'area:infra', patterns: ['infrastructure', 'server health', 'docker', 'gpu', 'node monitor'] },
              { label: 'area:api', patterns: ['/api/', 'api route', 'endpoint', 'webhook', 'sdk'] },
              { label: 'area:frontend', patterns: ['dashboard', 'page', 'ui', 'component', 'mobile', 'layout'] },
              { label: 'area:database', patterns: ['migration', 'database', 'postgres', 'timescaledb', 'schema'] },
            ];

            for (const rule of rules) {
              if (rule.patterns.some((pattern) => haystack.includes(pattern))) {
                labels.add(rule.label);
              }
            }

            if (issue.title.toLowerCase().includes('[bug]') || haystack.includes('what happened')) {
              labels.add('bug');
            }

            if (issue.title.toLowerCase().includes('[feature]') || haystack.includes('ideal solution')) {
              labels.add('feature-request');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels],
            });

      - name: Add workflow summary note for maintainers
        run: |
          {
            echo "# Issue triage completed"
            echo ""
            echo "Issue #${{ github.event.issue.number }} was labeled automatically based on its title and form content."
          } >> "$GITHUB_STEP_SUMMARY"

  pull_request_triage:
    name: Label pull requests by changed paths and checklist content
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check out repository metadata
        uses: actions/checkout@v5

      - name: Apply path-based labels using labeler rules
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add semantic labels from pull request template selections
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || '').toLowerCase();
            const labels = new Set(['needs-triage']);

            const checkboxRules = [
              { marker: '- [x] documentation', label: 'documentation' },
              { marker: '- [x] installation guidance', label: 'installation' },
              { marker: '- [x] operations / runbook', label: 'area:infra' },
              { marker: '- [x] ci / github automation', label: 'ci' },
              { marker: '- [x] security hardening', label: 'security' },
            ];

            for (const rule of checkboxRules) {
              if (body.includes(rule.marker)) labels.add(rule.label);
            }

            if (body.includes('destructive behavior called out explicitly') || body.includes('security-sensitive change documented')) {
              labels.add('security');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [...labels],
            });

      - name: Remove needs-triage from draft pull requests that are ready to review later
        if: github.event.pull_request.draft == false
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'needs-triage',
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }