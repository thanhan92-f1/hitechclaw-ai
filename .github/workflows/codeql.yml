name: CodeQL Security Analysis

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tsconfig.json"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tsconfig.json"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "15 2 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript / TypeScript attack surface
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    env:
      CI: true
      DATABASE_URL: postgresql://hitechclaw-ai:hitechclaw-ai@127.0.0.1:5432/hitechclaw-ai
      HITECHCLAW_AI_BASE_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: codeql-analysis-secret-please-override-in-production
      NEXTAUTH_URL: http://127.0.0.1:3000
      MC_ADMIN_TOKEN: codeql-analysis-admin-token
      MC_AGENT_TOKENS: default:codeql-analysis-agent-token
      MC_AGENT_TOKEN: default:codeql-analysis-agent-token
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Initialize CodeQL with extended JavaScript / TypeScript queries
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Build Next.js application for richer analysis context
        run: npm run build

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript