name: Deploy · Self-hosted Production

on:
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "deploy/scripts/deploy.sh"
      - ".github/workflows/deploy-self-hosted.yml"
  workflow_run:
    workflows: ["Docker · Build & Publish Images"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy to production runner
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: [self-hosted, windows, x64, deploy, production]
    timeout-minutes: 30
    env:
      HITECHCLAW_SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/hitechclaw-server:latest
      HITECHCLAW_WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/hitechclaw-web:latest

    steps:
      - name: Checkout workflow commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          clean: false

      - name: Checkout current ref
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          clean: false

      - name: Load production env file from runner host
        shell: pwsh
        run: |
          $runnerEnvFile = 'C:\actions-runner\config\hitechclaw.prod.env'
          if (Test-Path $runnerEnvFile) {
            Copy-Item $runnerEnvFile .env -Force
            Write-Host "Loaded .env from: $runnerEnvFile"
          } elseif (-not (Test-Path '.env')) {
            throw "Missing env file. Create $runnerEnvFile or provide .env in the workspace."
          }

      - name: Validate required secrets
        shell: pwsh
        run: |
          if (-not (Test-Path '.env')) {
            throw 'Missing .env file on runner workspace. Create it with PG_PASSWORD and production values.'
          }

          $envText = Get-Content '.env' -Raw
          if ($envText -notmatch '(^|\r?\n)PG_PASSWORD=') {
            throw 'Missing PG_PASSWORD in .env file.'
          }

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        shell: pwsh
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml pull hitechclaw web

      - name: Deploy containers
        shell: pwsh
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

      - name: Verify health endpoint
        shell: pwsh
        run: |
          $healthUrl = 'http://127.0.0.1:5102/health/ready'
          $success = $false

          for ($i = 1; $i -le 12; $i++) {
            try {
              $response = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                Write-Host 'Health check passed.'
                $success = $true
                break
              }
            } catch {
              Write-Host "Health check attempt $i/12 failed."
            }
            Start-Sleep -Seconds 5
          }

          if (-not $success) {
            throw "Health check failed: $healthUrl"
          }

      - name: Show running services
        shell: pwsh
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml ps