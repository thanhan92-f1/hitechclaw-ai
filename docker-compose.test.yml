services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: hitechclaw-ai-db-test
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT:-55432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hitechclaw-ai_test}
      POSTGRES_USER: ${POSTGRES_USER:-hitechclaw-ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hitechclaw-ai}
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hitechclaw-ai} -d ${POSTGRES_DB:-hitechclaw-ai_test}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hitechclaw-ai-redis-test
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-56379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no", "--loglevel", "warning"]

volumes:
  pgdata_test:
